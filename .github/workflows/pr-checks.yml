name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-title-check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

  pr-size-check:
    runs-on: ubuntu-latest
    steps:
      - name: Add size labels
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const changedFiles = pr.changed_files;
            const additions = pr.additions;
            const deletions = pr.deletions;
            const totalChanges = additions + deletions;

            let label;
            if (totalChanges < 100) label = 'size/XS';
            else if (totalChanges < 300) label = 'size/S';
            else if (totalChanges < 600) label = 'size/M';
            else if (totalChanges < 1000) label = 'size/L';
            else label = 'size/XL';

            const existingLabels = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            }).then(res => res.data.map(l => l.name));

            const newLabels = existingLabels.filter(l => !l.startsWith('size/')).concat(label);

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: newLabels,
            });

            if (label === 'size/XL') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '⚠️ This PR is quite large! Consider splitting it into smaller, more focused pull requests.',
              });
            }

  conflict-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check for merge conflicts
        uses: eps1lon/actions-label-merge-conflict@v3
        with:
          dirtyLabel: 'merge-conflict'
          repoToken: ${{ secrets.GITHUB_TOKEN }}
